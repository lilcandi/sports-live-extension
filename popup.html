<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="popup.css">
</head>
<body>
<!-- Header -->
<header>
  <h1>赛事播报</h1>
  <div class="header-actions">
    <button id="refreshBtn" title="手动刷新全部数据">↻</button>
    <button id="settingsBtn" title="设置">⚙</button>
  </div>
</header>

<!-- Main Tabs -->
<nav class="main-tabs">
  <button class="main-tab active" data-tab="live">实时赛事</button>
  <button class="main-tab" data-tab="news">中文资讯</button>
  <button class="main-tab" data-tab="future">未来赛程</button>
  <button class="main-tab" data-tab="history">历史搜索</button>
  <button class="main-tab" data-tab="favs">我的收藏</button>
</nav>

<!-- ========== Tab 1: 实时赛事 ========== -->
<section class="tab-content active" id="tab-live">
  <div class="filter-bar">
    <button class="filter-btn active" data-sport="all">全部</button>
    <button class="filter-btn" data-sport="football">足球</button>
    <button class="filter-btn" data-sport="basketball">篮球</button>
    <button class="filter-btn" data-sport="esports">电竞</button>
    <button class="filter-btn" data-sport="other">其他</button>
  </div>
  <div id="liveScoreList"></div>
</section>

<!-- ========== Tab 2: 中文资讯 ========== -->
<section class="tab-content" id="tab-news">
  <div class="filter-bar">
    <button class="filter-btn active" data-source="all">全部</button>
    <button class="filter-btn" data-source="微博热搜">微博</button>
    <button class="filter-btn" data-source="知乎热榜">知乎</button>
    <button class="filter-btn" data-source="虎扑">虎扑</button>
    <button class="filter-btn" data-source="虎扑电竞">电竞</button>
  </div>
  <div id="newsFeedList"></div>
</section>

<!-- ========== Tab 3: 未来赛程 ========== -->
<section class="tab-content" id="tab-future">
  <div class="filter-bar">
    <button class="filter-btn active" data-sport="all">全部</button>
    <button class="filter-btn" data-sport="football">足球</button>
    <button class="filter-btn" data-sport="esports">电竞</button>
  </div>
  <div id="futureEventList"></div>
</section>

<!-- ========== Tab 4: 历史搜索 ========== -->
<section class="tab-content" id="tab-history">
  <div class="search-box-row">
    <input type="text" id="historySearchInput" placeholder="搜索队伍/联赛/赛事名称...">
    <select id="historyRange">
      <option value="7">最近7天</option>
      <option value="30">最近30天</option>
      <option value="90">最近3个月</option>
      <option value="180">最近6个月</option>
      <option value="365" selected>最近1年</option>
    </select>
    <button id="historySearchBtn">搜索</button>
  </div>
  <div id="historyResultList"></div>
  <div class="history-footer">
    <span id="historyCount"></span>
    <button id="clearHistoryBtn" class="btn-sm">清空记录</button>
  </div>
</section>

<!-- ========== Tab 5: 我的收藏 ========== -->
<section class="tab-content" id="tab-favs">
  <div id="favoritesList"></div>
</section>

<!-- Footer -->
<footer>
  <span id="footerInfo"></span>
  <span id="updateTime">--</span>
</footer>

<script src="data/leagues.js"></script>
<script src="popup.js"></script>
</body>
</html>
