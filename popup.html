<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="popup.css">
</head>
<body>
<header>
  <h1>赛事播报</h1>
  <div class="header-actions">
    <button id="refreshBtn" title="手动刷新">↻</button>
    <button id="settingsBtn" title="设置">⚙</button>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-sport="all">全部</button>
  <button class="filter-btn" data-sport="football">足球</button>
  <button class="filter-btn" data-sport="basketball">篮球</button>
  <button class="filter-btn" data-sport="other">其他</button>
</div>

<div id="scoreList">
  <div class="empty-state">
    <div class="empty-icon">📡</div>
    <div class="empty-text">正在获取赛事数据...</div>
    <div class="empty-hint">若长时间空白，请点击 ↻ 刷新</div>
  </div>
</div>

<footer>
  <span id="matchCount">0 场赛事</span>
  <span id="updateTime">--</span>
</footer>

<script src="popup.js"></script>
</body>
</html>
